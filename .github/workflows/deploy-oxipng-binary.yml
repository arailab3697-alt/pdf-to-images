name: Deploy oxipng-wasm binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-oxipng-binary:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build deployable oxipng-wasm bundle
        run: |
          rm -rf dist
          mkdir -p dist/oxipng-wasm
          npm pack oxipng-wasm@0.1.0
          tar -xzf oxipng-wasm-0.1.0.tgz
          cp package/oxipng_wasm.js dist/oxipng-wasm/
          cp package/oxipng_wasm_bg.js dist/oxipng-wasm/
          cp package/oxipng_wasm_bg.wasm dist/oxipng-wasm/
          cp package/LICENSE dist/oxipng-wasm/
          cp package/LICENSE-THIRD-PARTY dist/oxipng-wasm/
          cp -r web/ dist/

      - name: Upload binary as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxipng-wasm-binary
          path: dist/oxipng-wasm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
